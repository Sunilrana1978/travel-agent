# Cloud Build — Deploy to Vertex AI Agent Engine
# Triggered on push to:
#   - 'staging' branch → deploys to staging Agent Engine instance
#   - 'main' branch    → deploys to production Agent Engine instance
#
# Substitutions set per Cloud Build trigger:
#   _ENV    = staging | prod
#   _REGION = us-west1

steps:
  # ── Step 1: Install uv and sync dependencies ─────────────────────────────────
  - name: "python:3.12-slim"
    id: install-dependencies
    entrypoint: bash
    args:
      - -c
      - |
        pip install uv --quiet
        uv sync

  # ── Step 2: Run unit tests before deploying ──────────────────────────────────
  - name: "python:3.12-slim"
    id: pre-deploy-tests
    entrypoint: bash
    args:
      - -c
      - uv run pytest tests/test_tools.py tests/test_agent.py -v --tb=short
    waitFor:
      - install-dependencies

  # ── Step 3: Deploy to Vertex AI Agent Engine ─────────────────────────────────
  - name: "python:3.12-slim"
    id: deploy
    entrypoint: bash
    args:
      - -c
      - |
        uv run python scripts/deploy_agent_engine.py \
          --project=${PROJECT_ID} \
          --region=${_REGION} \
          --env=${_ENV}
    env:
      - "PROJECT_ID=$PROJECT_ID"
    waitFor:
      - pre-deploy-tests

substitutions:
  _REGION: us-west1
  _ENV: staging   # Overridden per trigger: staging → 'staging', main → 'prod'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
