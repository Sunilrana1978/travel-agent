steps:
  # ── Step 1: Install uv and sync all dependencies ────────────────────────────
  - name: "python:3.12-slim"
    id: install-dependencies
    entrypoint: bash
    args:
      - -c
      - |
        pip install uv --quiet
        uv sync --all-groups

  # ── Step 2: Lint with ruff ───────────────────────────────────────────────────
  - name: "python:3.12-slim"
    id: lint
    entrypoint: bash
    args:
      - -c
      - uv run ruff check app/ tests/
    waitFor:
      - install-dependencies

  # ── Step 3: Unit tests ───────────────────────────────────────────────────────
  - name: "python:3.12-slim"
    id: unit-tests
    entrypoint: bash
    args:
      - -c
      - uv run pytest tests/test_tools.py tests/test_agent.py -v --tb=short
    waitFor:
      - install-dependencies

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
